spring.application.name=taxis

#   ===============================
#   Configuraciones JPA + MySQL
#   ===============================

#spring.datasource.url=jdbc:mysql://localhost:3306/taxis?createDatabaseIfNotExist=true&serverTimezone=UTC
#spring.datasource.username=root
#spring.datasource.password=12345
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#server.port=8080

#   ===============================
#   DataSource H2
#   ===============================

spring.datasource.url=jdbc:h2:mem:taxisdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=

#   ===============================
#   JPA / HIBERNATE
#   ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Para que h2 se porte como MySQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

#   ===============================
#   H2 Console
#   ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console